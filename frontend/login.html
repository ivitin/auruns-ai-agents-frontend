<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Industrial AI Agent</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: var(--text-light);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--text-color);
        }
        
        .form-group input {
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .login-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .login-btn:hover {
            background: var(--secondary-color);
        }
        
        .login-btn:disabled {
            background: var(--text-light);
            cursor: not-allowed;
        }
        
        .error-message {
            background: #fee;
            color: var(--danger-color);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--danger-color);
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🤖 Industrial AI Agent</h1>
                <p>Unified Namespace - Indústria 4.0</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Nome de Usuário *</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Digite seu nome de usuário"
                        required
                        autocomplete="username"
                    >
                </div>
                
                <div class="form-group">
                    <label for="email">Email (opcional)</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="seu@email.com"
                        autocomplete="email"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Entrar
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light); font-size: 0.875rem;">
                Novo por aqui? Não se preocupe, basta digitar seu nome!
            </p>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000/api/v1';
        
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        
        // Verifica se já está logado
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            window.location.href = 'index.html';
        }
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            
            if (!username) {
                showError('Por favor, digite seu nome de usuário.');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Entrando...';
            errorMessage.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email || null
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Erro ao fazer login');
                }
                
                const data = await response.json();
                
                // Salva dados do usuário
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                localStorage.setItem('authToken', data.token);
                
                // Redireciona para o chat
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('Erro no login:', error);
                showError('Erro ao fazer login. Tente novamente.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
